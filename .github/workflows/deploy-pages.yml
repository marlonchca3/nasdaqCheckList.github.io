name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDOzaWazKdlYhP75PY8X0Y3-byhFT8iVYc
          VITE_FIREBASE_AUTH_DOMAIN: blogeekplatzi-d97a4.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: blogeekplatzi-d97a4
          VITE_FIREBASE_STORAGE_BUCKET: blogeekplatzi-d97a4.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "168008095795"
          VITE_FIREBASE_APP_ID: 1:168008095795:web:00172cbe1521ffc4732b46
          VITE_FIREBASE_MEASUREMENT_ID: G-G4RL05137K
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4